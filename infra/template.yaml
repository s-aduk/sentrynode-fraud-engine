AWSTemplateFormatVersion: "2010-09-09"

Description: SentryNode Fraud Engine Infrastructure

Parameters:

  AlertEmail:
    Type: String
    Description: Email address for fraud alerts

Resources:

  AuditTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: transaction_id
          AttributeType: S
      KeySchema:
        - AttributeName: transaction_id
          KeyType: HASH

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: SentryNode Fraud Alerts

  AlertEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      Endpoint: !Ref AlertEmail
      TopicArn: !Ref AlertTopic

  IngestionQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: SentryNode-IngestionQueue
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 3

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: SentryNode-DLQ

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SendToSQS
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt IngestionQueue.Arn

  TransactionApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: SentryNode-TransactionApi

  TransactionResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref TransactionApi
      ParentId: !GetAtt TransactionApi.RootResourceId
      PathPart: transaction

  TransactionMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TransactionApi
      ResourceId: !Ref TransactionResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:sqs:path/${AWS::AccountId}/${IngestionQueue.QueueName}
        Credentials: !GetAtt ApiGatewayRole.Arn
        RequestParameters:
          integration.request.header.Content-Type: "'application/x-www-form-urlencoded'"
        RequestTemplates:
          application/json: "Action=SendMessage&MessageBody=$util.urlEncode($input.body)"
        IntegrationResponses:
          - StatusCode: 200
      MethodResponses:
        - StatusCode: 200

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: TransactionMethod
    Properties:
      RestApiId: !Ref TransactionApi
      StageName: prod

Outputs:

  AuditTableName:
    Description: Name of the DynamoDB audit table
    Value: !Ref AuditTable

  AlertTopicArn:
    Description: ARN of the SNS alert topic
    Value: !Ref AlertTopic
