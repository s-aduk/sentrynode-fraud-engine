AWSTemplateFormatVersion: "2010-09-09"

Transform: AWS::Serverless-2016-10-31

Description: >
  SentryNode Fraud Engine Infrastructure
  Event-driven serverless fraud detection system

Parameters:

  AlertEmail:
    Type: String
    Description: Email address for SNS fraud alerts

  AllowedOrigin:
    Type: String
    Description: Frontend origin allowed by CORS

  LogRetentionDays:
    Type: Number
    Default: 3
    Description: CloudWatch log retention period

Globals:

  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256

Resources:

  ##################################################
  # Dead Letter Queue
  ##################################################

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: sentrynode-dlq
      MessageRetentionPeriod: 1209600

  ##################################################
  # Ingestion Queue
  ##################################################

  IngestionQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: sentrynode-ingestion-queue
      VisibilityTimeout: 60
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 3

  ##################################################
  # DynamoDB Audit Table
  ##################################################

  AuditTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sentrynode-audit-log
      BillingMode: PAY_PER_REQUEST

      AttributeDefinitions:
        - AttributeName: transaction_id
          AttributeType: S

      KeySchema:
        - AttributeName: transaction_id
          KeyType: HASH

  ##################################################
  # SNS Topic
  ##################################################

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: SentryNode Fraud Alerts

  AlertEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      Endpoint: !Ref AlertEmail
      TopicArn: !Ref AlertTopic

  ##################################################
  # Lambda IAM Role
  ##################################################

  FraudEvaluatorRole:
    Type: AWS::IAM::Role

    Properties:

      AssumeRolePolicyDocument:
        Version: "2012-10-17"

        Statement:
          - Effect: Allow

            Principal:
              Service:
                - lambda.amazonaws.com

            Action:
              - sts:AssumeRole

      Policies:

        - PolicyName: FraudEvaluatorPermissions

          PolicyDocument:

            Version: "2012-10-17"

            Statement:

              ##################################################
              # CloudWatch Logs
              ##################################################

              - Effect: Allow

                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents

                Resource: "*"

              ##################################################
              # DynamoDB
              ##################################################

              - Effect: Allow

                Action:
                  - dynamodb:PutItem

                Resource: !GetAtt AuditTable.Arn

              ##################################################
              # SNS
              ##################################################

              - Effect: Allow

                Action:
                  - sns:Publish

                Resource: !Ref AlertTopic

              ##################################################
              # SQS Permissions (Required)
              ##################################################

              - Effect: Allow

                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:ChangeMessageVisibility

                Resource: !GetAtt IngestionQueue.Arn

  ##################################################
  # Lambda Function
  ##################################################

  FraudEvaluatorFunction:
    Type: AWS::Serverless::Function

    Properties:

      FunctionName: sentrynode-fraud-evaluator

      CodeUri: ../lambda/

      Handler: fraud_evaluator.handler

      Runtime: python3.12

      Role: !GetAtt FraudEvaluatorRole.Arn

      Environment:

        Variables:

          AUDIT_TABLE: !Ref AuditTable

          ALERT_TOPIC: !Ref AlertTopic

      Events:

        SQSQueue:
          Type: SQS

          Properties:

            Queue: !GetAtt IngestionQueue.Arn

            BatchSize: 10

            FunctionResponseTypes:
              - ReportBatchItemFailures

##################################################
# Outputs
##################################################

Outputs:

  AuditTableName:
    Description: DynamoDB Audit Table Name
    Value: !Ref AuditTable

  AlertTopicArn:
    Description: SNS Topic ARN
    Value: !Ref AlertTopic

  IngestionQueueUrl:
    Description: SQS Queue URL
    Value: !Ref IngestionQueue